name: Build and Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    release_gates:
        runs-on: windows-latest
        permissions:
            contents: read
        env:
            GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

        steps:
            - name: Checkout Code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
              with:
                  version: 10.33.0

            - name: Install Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: 24.12.0
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Restore Turborepo Cache
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}

            - name: License Allowlist Gate
              run: pnpm run licenses:check

            - name: SBOM Gate
              run: pnpm run sbom:check

            - name: Secret and Env Drift Gate
              run: pnpm run secrets:check

            - name: Dependency Governance Check
              run: pnpm run deps:check

            - name: Repo Settings Desired-State Check
              run: pnpm run repo-settings:check

            - name: CODEOWNERS Role Map Check
              run: pnpm run codeowners:check

            - name: Release Changelog Coverage Check
              run: pnpm run changelog:check

            - name: Boundary Governance Check
              run: pnpm run boundaries:check

            - name: Architecture Budget Gate
              run: pnpm run architecture:check

            - name: Lint
              run: pnpm run lint

            - name: Type Check
              run: pnpm run typecheck

            - name: Test
              run: pnpm test

            - name: Coverage Seal Gate
              run: pnpm run test:coverage

            - name: Seal Exclusion Governance Gate
              run: pnpm run seal-exclusions:check

            - name: Security Regression Suite
              run: pnpm run test:security

            - name: Desktop Governance Check
              run: pnpm run desktop:check

            - name: Release Health Checklist Gate
              run: pnpm run release:check

            - name: Release Tag Provenance Gate
              run: pnpm run release:provenance:check

            - name: Lifecycle Benchmark Gate
              run: pnpm run bench

            - name: Audit Gate Summary
              run: pnpm run audit:gates

            - name: Lifecycle Governance Report
              run: pnpm run governance:report

    desktop_package:
        needs: release_gates
        runs-on: windows-latest
        permissions:
            contents: read
        env:
            GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

        steps:
            - name: Checkout Code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
              with:
                  version: 10.33.0

            - name: Install Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: 24.12.0
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Restore Turborepo Cache
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}

            - name: Build Desktop Package
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CSC_LINK: ${{ secrets.CSC_LINK }}
                  CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
                  WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
                  WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
              run: |
                  pnpm run build
                  pnpm run bundle:check
                  pnpm --dir apps/desktop run electron:build -- -p never

            - name: Release Artifact Evidence
              run: pnpm run release:artifacts:check

            - name: Lifecycle Certification
              run: pnpm run lifecycle:certify

            - name: Export Governance Artifacts
              if: always()
              run: pnpm run governance:artifacts -- --out-dir artifacts/governance

            - name: Governance Evidence Health Gate
              if: always()
              run: pnpm run governance:evidence:check -- --artifacts-dir artifacts/governance

            - name: Upload Desktop Release Artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: desktop-release-artifacts
                  path: apps/desktop/dist_electron
                  retention-days: 30

            - name: Upload Governance Artifacts
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: governance-evidence
                  path: artifacts/governance
                  retention-days: 30

    publish_release:
        needs: desktop_package
        if: startsWith(github.ref, 'refs/tags/')
        runs-on: windows-latest
        permissions:
            contents: write

        steps:
            - name: Download Desktop Release Artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: desktop-release-artifacts
                  path: desktop-release-artifacts

            - name: Publish Release Artifacts
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: pwsh
              run: |
                  $tag = $env:GITHUB_REF_NAME
                  $dist = Join-Path $env:GITHUB_WORKSPACE 'desktop-release-artifacts'
                  $artifacts = Get-ChildItem -LiteralPath $dist -Recurse -File | Where-Object { @('.exe', '.blockmap', '.yml', '.yaml') -contains $_.Extension.ToLowerInvariant() }
                  if ($artifacts.Count -eq 0) {
                      throw "No desktop release artifacts were found in $dist."
                  }
                  gh release view $tag *> $null
                  if ($LASTEXITCODE -ne 0) {
                      gh release create $tag --verify-tag --title $tag --notes "GemDuel desktop release $tag"
                  }
                  $artifactPaths = $artifacts | ForEach-Object { $_.FullName }
                  & gh release upload $tag @artifactPaths --clobber
