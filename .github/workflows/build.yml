name: Build and Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

jobs:
    release:
        runs-on: windows-latest
        permissions:
            contents: write
        env:
            GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.12.0
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Restore Turborepo Cache
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}

            - name: License Allowlist Gate
              run: pnpm run licenses:check

            - name: SBOM Gate
              run: pnpm run sbom:check

            - name: Secret and Env Drift Gate
              run: pnpm run secrets:check

            - name: Dependency Governance Check
              run: pnpm run deps:check

            - name: Boundary Governance Check
              run: pnpm run boundaries:check

            - name: Architecture Budget Gate
              run: pnpm run architecture:check

            - name: Lint
              run: pnpm run lint

            - name: Type Check
              run: pnpm run typecheck

            - name: Test
              run: pnpm test

            - name: Coverage Seal Gate
              run: pnpm run test:coverage

            - name: Seal Exclusion Governance Gate
              run: pnpm run seal-exclusions:check

            - name: Security Regression Suite
              run: pnpm run test:security

            - name: Desktop Governance Check
              run: pnpm run desktop:check

            - name: Release Health Checklist Gate
              run: pnpm run release:check

            - name: Release Tag Provenance Gate
              run: pnpm run release:provenance:check

            - name: Build and Publish
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: pnpm run electron:build -- -p always

            - name: Export Governance Artifacts
              if: always()
              run: pnpm run governance:artifacts -- --out-dir artifacts/governance

            - name: Governance Evidence Health Gate
              if: always()
              run: pnpm run governance:evidence:check -- --artifacts-dir artifacts/governance

            - name: Upload Governance Artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: governance-evidence
                  path: artifacts/governance
                  retention-days: 30
