name: Build and Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

jobs:
    release:
        runs-on: windows-latest
        permissions:
            contents: write

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.12.0
                  cache: 'npm'

            - name: Install Dependencies
              run: npm ci

            - name: License Allowlist Gate
              run: npm run licenses:check

            - name: SBOM Gate
              run: npm run sbom:check

            - name: Secret and Env Drift Gate
              run: npm run secrets:check

            - name: Dependency Governance Check
              run: npm run deps:check

            - name: Boundary Governance Check
              run: npm run boundaries:check

            - name: Architecture Budget Gate
              run: npm run architecture:check

            - name: Lint
              run: npm run lint

            - name: Type Check
              run: npm run typecheck

            - name: Test
              run: npm test

            - name: Security Regression Suite
              run: npm run test:security

            - name: Desktop Governance Check
              run: npm run desktop:check

            - name: Release Health Checklist Gate
              run: npm run release:check

            - name: Build and Publish
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npm run electron:build -- -p always

            - name: Export Governance Artifacts
              if: always()
              run: npm run governance:artifacts -- --out-dir artifacts/governance

            - name: Upload Governance Artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: governance-evidence
                  path: artifacts/governance
                  retention-days: 14
