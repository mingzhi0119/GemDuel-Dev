name: Dependency Governance

on:
    workflow_dispatch:
    schedule:
        - cron: '0 13 * * 1'

jobs:
    production-audit:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Install Dependencies
              run: npm ci

            - name: Dependency Governance Check
              run: npm run deps:check
