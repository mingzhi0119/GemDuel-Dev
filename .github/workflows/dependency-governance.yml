name: Dependency Governance

on:
    pull_request:
    workflow_dispatch:
    schedule:
        - cron: '0 13 * * 1'

jobs:
    production-audit:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.12.0
                  cache: 'npm'

            - name: Install Dependencies
              run: npm ci

            - name: License Allowlist Gate
              run: npm run licenses:check

            - name: SBOM Gate
              run: npm run sbom:check

            - name: Upload Dependency SBOM Snapshot
              uses: actions/upload-artifact@v4
              with:
                  name: dependency-sbom-snapshot
                  path: governance/dependency-sbom.snapshot.json
                  retention-days: 30

            - name: Secret and Env Drift Gate
              run: npm run secrets:check

            - name: Dependency Governance Check
              run: npm run deps:check
