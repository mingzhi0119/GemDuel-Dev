name: Dependency Governance

on:
    pull_request:
    workflow_dispatch:
    schedule:
        - cron: '0 13 * * 1'

permissions:
    contents: read

jobs:
    production-audit:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup pnpm
              uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
              with:
                  version: 10.33.0

            - name: Install Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: 24.12.0
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Restore Turborepo Cache
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}

            - name: License Allowlist Gate
              run: pnpm run licenses:check

            - name: SBOM Gate
              run: pnpm run sbom:check

            - name: Upload Dependency SBOM Snapshot
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: dependency-sbom-snapshot
                  path: tools/governance/dependency-sbom.snapshot.json
                  retention-days: 30

            - name: Secret and Env Drift Gate
              run: pnpm run secrets:check

            - name: Dependency Governance Check
              run: pnpm run deps:check

            - name: Repo Settings Desired-State Check
              run: pnpm run repo-settings:check
