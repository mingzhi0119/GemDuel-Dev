name: Governance Checks

on:
    pull_request:
    workflow_dispatch:

jobs:
    governance:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Install Dependencies
              run: npm ci

            - name: Dependency Governance Check
              run: npm run deps:check

            - name: Lint
              run: npm run lint

            - name: Security Regression Suite
              run: npm run test:security

            - name: Unit Test Suite
              run: npm test

            - name: Release Health Checklist Gate
              run: npm run release:check

            - name: Desktop Governance Check
              run: npm run desktop:check
