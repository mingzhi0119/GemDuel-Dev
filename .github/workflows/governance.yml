name: Governance Checks

on:
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    governance:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
              with:
                  version: 10.33.0

            - name: Install Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: 24.12.0
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Restore Turborepo Cache
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}

            - name: License Allowlist Gate
              run: pnpm run licenses:check

            - name: SBOM Gate
              run: pnpm run sbom:check

            - name: Secret and Env Drift Gate
              run: pnpm run secrets:check

            - name: Dependency Governance Check
              run: pnpm run deps:check

            - name: Repo Settings Desired-State Check
              run: pnpm run repo-settings:check

            - name: CODEOWNERS Role Map Check
              run: pnpm run codeowners:check

            - name: Release Changelog Coverage Check
              run: pnpm run changelog:check

            - name: Boundary Governance Check
              run: pnpm run boundaries:check

            - name: Architecture Budget Gate
              run: pnpm run architecture:check

            - name: Lint
              run: pnpm run lint

            - name: Type Check
              run: pnpm run typecheck

            - name: Security Regression Suite
              run: pnpm run test:security

            - name: Unit Test Suite
              id: unit_tests
              continue-on-error: true
              run: pnpm test

            - name: Coverage Seal Gate
              id: desktop_coverage
              continue-on-error: true
              run: pnpm run test:coverage

            - name: Coverage PR diff summary
              if: always()
              env:
                  COVERAGE_GIT_BASE: ${{ github.event.pull_request.base.sha || github.sha }}
                  COVERAGE_GIT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
              run: |
                  mkdir -p artifacts/governance
                  pnpm run coverage:summary -- --base "${COVERAGE_GIT_BASE}" --head "${COVERAGE_GIT_HEAD}" --append-step-summary

            - name: Key module per-file coverage report
              if: always()
              run: |
                  mkdir -p artifacts/governance
                  pnpm run coverage:perfile-modules

            - name: Enforce unit tests and coverage
              if: always()
              shell: bash
              run: |
                  if [ "${{ steps.unit_tests.outcome }}" != "success" ]; then
                    echo "::error::Unit test suite failed (see logs and job summary coverage diff)."
                    exit 1
                  fi
                  if [ "${{ steps.desktop_coverage.outcome }}" != "success" ]; then
                    echo "::error::Coverage seal gate failed (see logs and job summary coverage diff)."
                    exit 1
                  fi

            - name: Seal Exclusion Governance Gate
              run: pnpm run seal-exclusions:check

            - name: Release Health Checklist Gate
              run: pnpm run release:check

            - name: Desktop Governance Check
              run: pnpm run desktop:check

            - name: Build
              run: pnpm run build

            - name: Bundle Budget Gate
              run: pnpm run bundle:check

            - name: Lifecycle Benchmark Gate
              run: pnpm run bench

            - name: Audit Gate Summary
              run: pnpm run audit:gates

            - name: Lifecycle Governance Report
              run: pnpm run governance:report

            - name: Lifecycle Certification
              run: pnpm run lifecycle:certify

            - name: Export Governance Artifacts
              if: always()
              run: pnpm run governance:artifacts -- --out-dir artifacts/governance

            - name: Governance Evidence Health Gate
              if: always()
              run: pnpm run governance:evidence:check -- --artifacts-dir artifacts/governance

            - name: Upload Governance Artifacts
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: governance-evidence
                  path: artifacts/governance
                  retention-days: 30
