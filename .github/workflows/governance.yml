name: Governance Checks

on:
    pull_request:
    workflow_dispatch:

jobs:
    governance:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.12.0
                  cache: 'npm'

            - name: Install Dependencies
              run: npm ci

            - name: License Allowlist Gate
              run: npm run licenses:check

            - name: SBOM Gate
              run: npm run sbom:check

            - name: Secret and Env Drift Gate
              run: npm run secrets:check

            - name: Dependency Governance Check
              run: npm run deps:check

            - name: Boundary Governance Check
              run: npm run boundaries:check

            - name: Lint
              run: npm run lint

            - name: Security Regression Suite
              run: npm run test:security

            - name: Unit Test Suite
              run: npm test

            - name: Release Health Checklist Gate
              run: npm run release:check

            - name: Desktop Governance Check
              run: npm run desktop:check

            - name: Build
              run: npm run build

            - name: Export Governance Artifacts
              run: npm run governance:artifacts -- --out-dir artifacts/governance

            - name: Upload Governance Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: governance-evidence
                  path: artifacts/governance
                  retention-days: 14
